name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同分支/PR 有新 push 就取消進行中的舊 run，省 runner
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend · tsc + eslint + vitest + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: tsc --noEmit
        run: pnpm exec tsc --noEmit
      - name: mcp-server typecheck
        run: pnpm --filter @koimsurai/mcp-server typecheck
      # --max-warnings 是 ratchet：擋住新增警告，存量（404）分批燒掉後再往下調
      - name: eslint (src)
        run: pnpm exec eslint src --max-warnings 404
      - name: vitest
        run: pnpm test
      # 真正的建置驗證——tsc/eslint 過不代表 Nitro/Vite build 不會炸
      - name: build (vite + nitro)
        run: pnpm build

  backend:
    name: Backend · clippy + test + specta drift
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: clippy (-D warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test
      # 契約守門：Rust struct 改了但沒重跑 export_types → 生成型別與 committed 不一致 → 擋下
      - name: specta types up-to-date
        run: |
          cargo run --bin export_types
          cd ..
          git diff --exit-code packages/api-types/index.ts
