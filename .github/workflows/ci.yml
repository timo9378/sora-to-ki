name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同分支/PR 有新 push 就取消進行中的舊 run，省 runner
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend · tsc + eslint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: tsc --noEmit
        run: pnpm exec tsc --noEmit
      - name: eslint (src)
        run: pnpm exec eslint src

  backend:
    name: Backend · clippy + test + specta drift
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: clippy (-D warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test
      # 契約守門：Rust struct 改了但沒重跑 export_types → 生成型別與 committed 不一致 → 擋下
      - name: specta types up-to-date
        run: |
          cargo run --bin export_types
          cd ..
          git diff --exit-code packages/api-types/index.ts
