# mutagen.yml (修正後 - 正確的扁平化結構)

# `sync` 應該是頂層的 key
sync:
  # `defaults` 區塊用來設定全域的忽略規則
  defaults:
    ignore:
      vcs: true
      paths:
        - "node_modules"
        - "**/node_modules"
        - ".vscode"
        - ".idea"
        - ".DS_Store"
        - "/dist"
        - "/build"
        - "*.log"

  # --- 直接在這裡定義您的同步任務 ---

  # 前端同步任務 (可以自訂任務名稱，例如 'frontend' 或 'app')
  frontend:
    alpha: "."
    beta: "docker://web-1_frontend-code"
    ignore:
      paths:
        - "/server"

  # 後端同步任務
  backend:
    alpha: "./server"
    beta: "docker://web-1_backend-code"