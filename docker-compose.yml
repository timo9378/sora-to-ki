volumes:
  backend-db-data: # DB 檔的 docker volume（backend-rs + db-backup 共用）

# 啟用 Docker BuildKit 的 Bake 功能以提升建置效能
# 在您的 shell 環境中設定此變數: export COMPOSE_BAKE=true (Linux/macOS) 或 $env:COMPOSE_BAKE="true" (Windows PowerShell)

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-website-frontend # 指定容器名稱
    environment:
      - TZ=Asia/Taipei
      - BACKEND_URL=http://backend-rs:3002
      - SITE_URL=https://koimsurai.com
      # 發文/改文後 backend-rs 會打 /_revalidate 清 ISR 快取，不必等 TTL（文章頁 1h）。
      # 密鑰放未提交的 ./.env（compose 會自動載入做 ${} 替換）；沒設 = 端點回 404、功能不啟用。
      - REVALIDATE_SECRET=${REVALIDATE_SECRET:-}
    ports:
      # 【修改點】明確指定只綁定到 127.0.0.1
      - "127.0.0.1:13588:13579"
    restart: unless-stopped # 設定容器重啟策略
    healthcheck:
      # slim image 沒有 curl/wget → 用 node 內建 fetch 打首頁
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:13579/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      backend-rs:
        condition: service_healthy

  backend-rs:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: personal-website-backend-rs
    environment:
      - TZ=Asia/Taipei
      - GALLERY_SOURCE_PATH=/usr/src/app/storage/Blog_Source
      - DATABASE_URL=sqlite:///usr/src/app/db/db.sqlite
      - BIND_ADDR=0.0.0.0:3002
      - RUST_LOG=info,koimsurai_web_backend=info
      # 文章內容變更後通知前端清 ISR 快取（fire-and-forget，失敗只會 warn，最壞就是等 TTL）。
      # 13579 = 前端容器內部 port（Dockerfile ENV PORT=13579）。兩邊密鑰必須相同。
      - FRONTEND_REVALIDATE_URL=http://frontend:13579/_revalidate
      - REVALIDATE_SECRET=${REVALIDATE_SECRET:-}
      # workers：Express 退役後 Rust 為 history 表唯一寫者
      - ENABLE_TRAKT_SYNC=1
      - ENABLE_BAHAMUT_SYNC=1
    volumes:
      - backend-db-data:/usr/src/app/db
      - /mnt/hdd16tb_01/Blog/uploads:/usr/src/app/storage/uploads
      - /mnt/hdd16tb_01/nas-storage/Blog_Source:/usr/src/app/storage/Blog_Source:ro
      - /mnt/hdd16tb_01/nas-storage/gallery:/usr/src/app/storage/gallery
    env_file:
      - ./.env.backend
    ports:
      - "127.0.0.1:3002:3002"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3002/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # SQLite 每日線上備份 → HDD（VACUUM INTO 快照 + gzip + 依天數輪替）。
  # alpine 開機裝 sqlite（唯一執行期依賴），跑 scripts/backup-db.sh。
  db-backup:
    image: alpine:3.20
    container_name: personal-website-db-backup
    environment:
      - TZ=Asia/Taipei
      - BACKUP_INTERVAL_SECONDS=86400
      - BACKUP_KEEP_DAYS=14
    volumes:
      - backend-db-data:/db # 與 backend-rs 共用（WAL 支援多程序讀）
      - ./scripts/backup-db.sh:/backup-db.sh:ro
      - /mnt/hdd16tb_01/Blog/db-backups:/backups
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache sqlite >/dev/null && exec /bin/sh /backup-db.sh"]
    restart: unless-stopped
