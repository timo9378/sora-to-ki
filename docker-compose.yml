volumes:
  backend-db:   # 定義 named volume 來持久化資料庫

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-website-frontend # 指定容器名稱
    ports:
      # 【修改點】明確指定只綁定到 127.0.0.1
      - "127.0.0.1:13588:13579" 
    volumes:
      # 將主機的憑證檔案掛載到容器內的 /etc/certs/
      # 注意：Compose 會自動處理 Windows 路徑轉換
      - ./privkey.pem:/etc/certs/privkey.pem:ro # :ro 表示唯讀掛載 (建議)
      - ./fullchain.pem:/etc/certs/fullchain.pem:ro # :ro 表示唯讀掛載 (建議)
      # 掛載原始碼以實現熱重載
      - .:/app
      - /app/node_modules # 避免覆蓋容器內的 node_modules
    restart: unless-stopped # 設定容器重啟策略
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: personal-website-backend
    working_dir: /usr/src/app
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
      - backend-db:/usr/src/app/db-backup   # 使用 named volume 備份資料庫
    env_file:
      - ./server/.env
    ports:
      # 【修改點】明確指定只綁定到 127.0.0.1
      - "127.0.0.1:3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "apk add --no-cache curl && curl -f http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
