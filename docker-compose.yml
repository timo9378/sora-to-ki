volumes:
  backend-db-data: # Volume for the database file
  backend-db-backup:
    # Volume for database backups

    # 啟用 Docker BuildKit 的 Bake 功能以提升建置效能
    # 在您的 shell 環境中設定此變數: export COMPOSE_BAKE=true (Linux/macOS) 或 $env:COMPOSE_BAKE="true" (Windows PowerShell)

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-website-frontend # 指定容器名稱
    environment:
      - TZ=Asia/Taipei
      - BACKEND_URL=http://backend-rs:3002
      - SITE_URL=https://koimsurai.com
    ports:
      # 【修改點】明確指定只綁定到 127.0.0.1
      - "127.0.0.1:13588:13579"
    restart: unless-stopped # 設定容器重啟策略
    depends_on:
      backend-rs:
        condition: service_healthy

  backend-rs:
    build:
      # context 拉高到 ~/Server：anigamer（獨立 repo）是 path dep，見 ~/Server/.dockerignore 白名單
      context: ..
      dockerfile: web/backend/Dockerfile
    container_name: personal-website-backend-rs
    environment:
      - TZ=Asia/Taipei
      - GALLERY_SOURCE_PATH=/usr/src/app/storage/Blog_Source
      - DATABASE_URL=sqlite:///usr/src/app/db/db.sqlite
      - BIND_ADDR=0.0.0.0:3002
      - RUST_LOG=info,koimsurai_web_backend=info
      # workers：Express 退役後 Rust 為 history 表唯一寫者
      - ENABLE_TRAKT_SYNC=1
      - ENABLE_BAHAMUT_SYNC=1
    volumes:
      - backend-db-data:/usr/src/app/db
      - /mnt/hdd16tb_01/Blog/uploads:/usr/src/app/storage/uploads
      - /mnt/hdd16tb_01/nas-storage/Blog_Source:/usr/src/app/storage/Blog_Source:ro
      - /mnt/hdd16tb_01/nas-storage/gallery:/usr/src/app/storage/gallery
    env_file:
      - ./.env.backend
    ports:
      - "127.0.0.1:3002:3002"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3002/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    profiles: ["legacy"]
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: personal-website-backend
    environment:
      - TZ=Asia/Taipei
      - GALLERY_SOURCE_PATH=/usr/src/app/storage/Blog_Source
    volumes:
      - backend-db-data:/usr/src/app/db # Mount the database directory
      - backend-db-backup:/usr/src/app/db-backup # 使用 named volume 備份資料庫
      # HDD Mounts
      - /mnt/hdd16tb_01/Blog/uploads:/usr/src/app/storage/uploads
      - /mnt/hdd16tb_01/nas-storage/Blog_Source:/usr/src/app/storage/Blog_Source:ro
      - /mnt/hdd16tb_01/nas-storage/gallery:/usr/src/app/storage/gallery
    env_file:
      - ./.env.backend
    ports:
      # 【修改點】明確指定只綁定到 127.0.0.1
      - "127.0.0.1:3001:3001"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
